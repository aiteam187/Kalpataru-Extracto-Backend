name: Deploy Backend to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Log in to Azure CLI
        env:
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            -p="$AZURE_CLIENT_SECRET" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Log in to Azure Container Registry (ACR)
        run: |
          az acr login --name kalpataruextractoacr

      - name: Build and Push Docker Image
        run: |
          docker build -t kalpataruextractoacr.azurecr.io/extracto-backend:${{ github.sha }} -t kalpataruextractoacr.azurecr.io/extracto-backend:latest .
          docker push kalpataruextractoacr.azurecr.io/extracto-backend:${{ github.sha }}
          docker push kalpataruextractoacr.azurecr.io/extracto-backend:latest

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          imageToDeploy: kalpataruextractoacr.azurecr.io/extracto-backend:${{ github.sha }}
          containerAppName: kalpataru-extracto-api
          resourceGroup: kalpataru-extracto-rg
